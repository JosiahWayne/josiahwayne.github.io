<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>Josiah — VSCode Theme Homepage</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="css/styles.css" />

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.6.82/build/pdf.min.js"></script>
    <script>
      window.pdfjsLib = window.pdfjsLib || {};
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.6.82/build/pdf.worker.min.js";
    </script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/common.min.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.25/dist/katex.min.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.25/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.25/dist/contrib/auto-render.min.js"></script>

  </head>
  <body>
    <div class="vscode-window">
      <header class="titlebar">
        <div class="titlebar-left">
          <span class="traffic-light red"></span>
          <span class="traffic-light yellow"></span>
          <span class="traffic-light green"></span>
        </div>
        <div class="titlebar-center">Josiah — VSCode Theme Homepage</div>
        <div class="titlebar-right"><span></span></div>
      </header>

      <div class="vscode-main">
        <aside class="sidebar">
          <div class="sidebar-section">
            <div class="sidebar-title">EXPLORER</div>
            <ul id="file-tree" class="sidebar-list"></ul>
          </div>
        </aside>
        <div class="resizer resizer-vertical" data-role="sidebar-resizer"></div>
        <main class="editor">
          <div id="editor-tabbar" class="editor-tabbar tabs"></div>
          <div id="editor-content" class="editor-content preview"></div>
        </main>
      </div>
      <div class="resizer resizer-horizontal" data-role="terminal-resizer"></div>

      <section class="terminal">
        <div class="terminal-header"><span>TERMINAL</span></div>
        <div id="terminal-output" class="terminal-output"></div>
        <div class="terminal-input-line">
          <span id="terminal-prompt" class="terminal-prompt">josiah@site:~$</span>
          <input id="terminal-input" class="terminal-input" autocomplete="off" spellcheck="false" />
        </div>
      </section>
    </div>
    <script src="js/resize.js"></script>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
